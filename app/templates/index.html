<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetVida - Cliente</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
            background: #f4f6f8;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1f4e79;
        }
        form {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }
        input, buttom {
            padding: 10px;
            font-size: 16px;
        }
        button {
            background: #1f4e79;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #163956;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #d9d9d9;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #eaf1f8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="/">Voltar ao Dashboard</a>
        </div>

        <h1>Cadastro de Clientes</h1>
        <form method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="telefone" placeholder="Telefone" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <button type="submit">Cadastrar Cliente</button>
        </form>

        <h2>Clientes Cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>E-mail</th>
                </tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c.id }}</td>
                    <td>{{ c.nome }}</td>
                    <td>{{ c.telefone }}</td>
                    <td>{{ c.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
